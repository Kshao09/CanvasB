<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Canvas – Inbox</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="app">

  <!-- ══════════════════════════════════════════════════════════
       GLOBAL NAV
  ══════════════════════════════════════════════════════════ -->
  <nav class="global-nav" aria-label="Primary navigation">
    <div class="nav-logo" aria-label="FIU">FIU</div>

    <a class="nav-item" href="#" title="Account" aria-label="Account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Account</span>
    </a>

    <a class="nav-item" href="#" title="Dashboard" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>

    <a class="nav-item" href="#" title="Courses" aria-label="Courses">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      <span class="nav-label">Courses</span>
    </a>

    <a class="nav-item" href="#" title="Calendar" aria-label="Calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8"  y1="2" x2="8"  y2="6"/>
        <line x1="3"  y1="10" x2="21" y2="10"/>
      </svg>
      <span class="nav-label">Calendar</span>
    </a>

    <!-- Inbox (active) -->
    <a class="nav-item active" href="#" title="Inbox" aria-label="Inbox – 231 unread" aria-current="page">
      <div class="nav-badge" aria-hidden="true">231</div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
      </svg>
      <span class="nav-label">Inbox</span>
    </a>

    <a class="nav-item" href="#" title="History" aria-label="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="nav-label">History</span>
    </a>

    <div class="nav-spacer"></div>

    <a class="nav-item" href="#" title="Help" aria-label="Help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span class="nav-label">Help</span>
    </a>

    <a class="nav-item" href="#" title="Back" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
  </nav>

  <!-- ══════════════════════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════════════════════ -->
  <div class="main">

    <!-- Top Bar -->
    <header class="topbar">
      <h1 class="topbar-title">Inbox</h1>
      <div class="topbar-actions">
        <button class="btn-settings" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          Settings
        </button>
        <button class="btn-compose" type="button" id="composeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Compose
        </button>
      </div>
    </header>

    <!-- Conversations area -->
    <div class="conversations">

      <!-- ════════════════════════════════════════════════════
           LIST PANE
      ════════════════════════════════════════════════════ -->
      <section class="list-pane" aria-label="Message list">

        <!-- Toolbar -->
        <div class="list-toolbar" role="toolbar" aria-label="Conversation filters">

          <!-- Course filter -->
          <div class="select-wrap">
            <select id="courseSelect" aria-label="Filter by course">
              <!-- populated by app.js -->
            </select>
          </div>

          <!-- Folder / inbox filter -->
          <div class="select-wrap">
            <select id="folderSelect" aria-label="Filter by folder">
              <!-- populated by app.js -->
            </select>
          </div>

          <!-- Search with autocomplete -->
          <div class="search-outer">
            <div class="search-wrap">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input
                id="searchInput"
                type="text"
                placeholder="Search by course, professor, subject…"
                aria-label="Search messages"
                aria-autocomplete="list"
                aria-controls="suggestionBox"
                autocomplete="off"
                spellcheck="false"
              />
              <button class="search-clear" id="searchClear" type="button" aria-label="Clear search" title="Clear">✕</button>
            </div>
            <!-- Autocomplete suggestions -->
            <div id="suggestionBox" role="listbox" aria-label="Search suggestions" aria-expanded="false"></div>
          </div>

          <!-- Address-book filter -->
          <button class="toolbar-icon-btn" type="button" title="Filter by user" aria-label="Filter by user">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </button>

          <!-- Reply -->
          <button class="toolbar-icon-btn" type="button" id="replyBtn" title="Reply" aria-label="Reply">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="9 17 4 12 9 7"/>
              <path d="M20 18v-2a4 4 0 00-4-4H4"/>
            </svg>
          </button>

          <!-- Reply All -->
          <button class="toolbar-icon-btn" type="button" id="replyAllBtn" title="Reply all" aria-label="Reply all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="7 17 2 12 7 7"/>
              <polyline points="13 17 8 12 13 7"/>
              <path d="M22 18v-2a4 4 0 00-4-4H8"/>
            </svg>
          </button>

          <!-- Archive -->
          <button class="toolbar-icon-btn" type="button" id="archiveBtn" title="Archive" aria-label="Archive">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="21 8 21 21 3 21 3 8"/>
              <rect x="1" y="3" width="22" height="5"/>
              <line x1="10" y1="12" x2="14" y2="12"/>
            </svg>
          </button>

          <!-- Download -->
          <button class="toolbar-icon-btn" type="button" title="Download" aria-label="Download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>

          <!-- Delete -->
          <button class="toolbar-icon-btn" type="button" id="deleteBtn" title="Delete" aria-label="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
          </button>

          <!-- More -->
          <button class="toolbar-icon-btn" type="button" title="More options" aria-label="More options">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <circle cx="12" cy="5"  r="1.5"/>
              <circle cx="12" cy="12" r="1.5"/>
              <circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>

        </div><!-- /.list-toolbar -->

        <!-- Message rows (populated by app.js) -->
        <div
          class="msg-list"
          id="msgList"
          role="listbox"
          aria-label="Conversations"
          aria-multiselectable="false"
        ></div>

      </section><!-- /.list-pane -->

      <!-- ════════════════════════════════════════════════════
           DETAIL PANE
      ════════════════════════════════════════════════════ -->
      <section class="detail-pane" aria-label="Message detail">

        <!-- Detail header (hidden until a message is selected) -->
        <div class="detail-header" id="detailHeader" style="display:none" role="region" aria-label="Message header">
          <div class="detail-subject" id="detailSubject"></div>
          <div class="detail-header-actions">
            <button class="icon-btn" type="button" title="Reply" aria-label="Reply">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polyline points="9 17 4 12 9 7"/>
                <path d="M20 18v-2a4 4 0 00-4-4H4"/>
              </svg>
            </button>
            <button class="icon-btn" type="button" title="Reply all" aria-label="Reply all">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polyline points="7 17 2 12 7 7"/>
                <polyline points="13 17 8 12 13 7"/>
                <path d="M22 18v-2a4 4 0 00-4-4H8"/>
              </svg>
            </button>
            <button class="icon-btn" type="button" title="More" aria-label="More options">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <circle cx="5"  cy="12" r="1.5"/>
                <circle cx="12" cy="12" r="1.5"/>
                <circle cx="19" cy="12" r="1.5"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Detail body (populated by app.js) -->
        <div class="detail-body" id="detailBody">
          <div class="empty-detail">
            <div class="empty-icon">✉️</div>
            <div>Select a conversation to read</div>
          </div>
        </div>

      </section><!-- /.detail-pane -->

    </div><!-- /.conversations -->
  </div><!-- /.main -->
</div><!-- /.app -->

<!-- ── Scripts: data first, then utilities, then app ─────────────────── -->
<script src="data/messages.js"></script>
<script src="js/search.js"></script>
<script src="js/filters.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
</body>
</html>
